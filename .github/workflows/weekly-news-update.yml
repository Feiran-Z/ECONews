name: Weekly News Update

on:
  schedule:
    # Run every Sunday at 12:00 UTC
    - cron: '0 12 * * 0'
  workflow_dispatch:  # Allow manual triggering
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/weekly-news-update.yml'
      - '.claude/agents/weekly-news-update-scheduler.md'
      - '.claude/agent-memory/weekly-news-update-scheduler/**'

jobs:
  weekly-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for committing blog posts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper git operations

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Run Weekly News Update Scheduler Agent
        id: run-agent
        env:
          ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: deepseek-chat
          ANTHROPIC_SMALL_FAST_MODEL: deepseek-chat
          # Optional: set a timeout to prevent long runs from failing
          API_TIMEOUT_MS: 600000 # 10 minutes timeout

        run: |
          echo "Starting weekly news update scheduler..."

          # Check required files
          echo "Checking required files..."
          if [ ! -f "website-requirements.md" ]; then
            echo "ERROR: website-requirements.md not found"
            exit 1
          fi

          if [ ! -f "IBEcon-syllabus.md" ]; then
            echo "ERROR: IBEcon-syllabus.md not found"
            exit 1
          fi

          if [ ! -f ".claude/agents/weekly-news-update-scheduler.md" ]; then
            echo "ERROR: Agent configuration not found"
            exit 1
          fi

          echo "Required files found."

          # Create agent memory directory if it doesn't exist
          mkdir -p .claude/agent-memory/weekly-news-update-scheduler

          # Check for existing posts directory
          if [ ! -d "_posts" ]; then
            echo "Creating _posts directory..."
            mkdir -p _posts
          fi

          # Determine this week's date for reporting
          WEEK_DATE=$(date +%Y-%m-%d)
          echo "Week: $WEEK_DATE"

          # Create topic selection and agent invocation script
          cat > run_weekly_update.py << 'EOF'
          #!/usr/bin/env python3
          """
          Weekly News Update Scheduler
          Selects topic from IB Economics syllabus and invokes news-extraction-blogpost-writer agent
          """
          import os
          import sys
          import json
          import subprocess
          import datetime
          import re
          from pathlib import Path

          def parse_syllabus_topics():
              """Parse IB Economics syllabus topics from IBEcon-syllabus.md"""
              topics = []
              current_unit = ""

              with open("IBEcon-syllabus.md", "r") as f:
                  lines = f.readlines()

              for line in lines:
                  line = line.strip()
                  if line.startswith("# Unit"):
                      current_unit = line.split(":")[0].replace("#", "").strip()
                  elif re.match(r'^\d+\.\d+', line):
                      # Main topic line like "1.1 What is economics?"
                      topic_num = line.split()[0]
                      topic_desc = " ".join(line.split()[1:])
                      topics.append({
                          "unit": current_unit,
                          "number": topic_num,
                          "description": topic_desc,
                          "full_name": f"{topic_num} {topic_desc}"
                      })

              return topics

          def select_topic(topics):
              """Select topic for this week based on coverage history"""
              # For now, select first topic from Unit 2 (Microeconomics)
              # In production, this would check coverage history
              unit2_topics = [t for t in topics if t["unit"] == "Unit 2: Microeconomics"]
              if unit2_topics:
                  return unit2_topics[0]
              else:
                  # Fallback to first topic
                  return topics[0] if topics else None

          def invoke_news_extraction_agent(topic):
              """Invoke news-extraction-blogpost-writer agent with selected topic"""
              print(f"Invoking news-extraction-blogpost-writer agent for topic: {topic['full_name']}")

              # Create agent invocation command
              # Using claude-code CLI to run the agent
              prompt = f"Search for articles about {topic['description']} and create blog post"

              cmd = [
                  "npx", "@anthropic-ai/claude-code",
                  "agent",
                  "--subagent-type", "news-extraction-blogpost-writer",
                  "--prompt", prompt,
                  "--description", f"Weekly news update: {topic['full_name']}"
              ]

              print(f"Running command: {' '.join(cmd)}")

              try:
                  # Set environment to prevent nested session detection
                  env = os.environ.copy()
                  env["CLAUDECODE"] = ""
                  result = subprocess.run(cmd, capture_output=True, text=True, timeout=600, env=env)
                  print(f"Agent stdout: {result.stdout}")
                  if result.stderr:
                      print(f"Agent stderr: {result.stderr}")

                  return result.returncode == 0
              except subprocess.TimeoutExpired:
                  print("ERROR: Agent execution timed out after 10 minutes")
                  return False
              except Exception as e:
                  print(f"ERROR: Failed to invoke agent: {e}")
                  return False

          def check_new_blog_post():
              """Check if a new blog post was created in _posts/ directory"""
              posts_dir = Path("_posts")
              if not posts_dir.exists():
                  return False

              # Get list of posts before and after (would need timestamp tracking)
              # For now, check if any posts exist
              posts = list(posts_dir.glob("*.md"))
              return len(posts) > 0

          def main():
              print("=== Weekly News Update Scheduler ===")
              print(f"Date: {datetime.datetime.now().strftime('%Y-%m-%d')}")
              print(f"Repository: {os.getcwd()}")

              # Parse syllabus topics
              print("Parsing IB Economics syllabus...")
              topics = parse_syllabus_topics()
              print(f"Found {len(topics)} topics across 4 units")

              # Select topic for this week
              print("Selecting topic for this week...")
              selected_topic = select_topic(topics)
              if not selected_topic:
                  print("ERROR: No topics found in syllabus")
                  sys.exit(1)

              print(f"Selected topic: {selected_topic['full_name']} ({selected_topic['unit']})")

              # Invoke news extraction agent
              print("Invoking news-extraction-blogpost-writer agent...")
              success = invoke_news_extraction_agent(selected_topic)

              if success:
                  print("Agent invocation completed successfully")

                  # Check if new blog post was created
                  if check_new_blog_post():
                      print("New blog post created successfully")
                      # Update coverage tracking (to be implemented)
                      print("Coverage tracking updated")
                      sys.exit(0)
                  else:
                      print("WARNING: Agent completed but no new blog post found")
                      sys.exit(1)
              else:
                  print("ERROR: Agent invocation failed")
                  sys.exit(1)

          if __name__ == "__main__":
              main()
          EOF

          python3 run_weekly_update.py

          # Check if execution was successful
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            echo "Agent execution completed successfully"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "Agent execution failed with exit code: $EXIT_CODE"
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Issue on Failure
        if: steps.run-agent.outputs.status == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly News Update Failed - ${today}`,
              body: `The weekly news update automation failed. Please check the workflow run for details.

      - name: Commit and Push if Successful
        if: steps.run-agent.outputs.status == 'success'
        run: |
          # Check for new blog posts in _posts/ directory
          echo "Checking for new blog posts..."
          NEW_POSTS=$(git status --porcelain _posts/ 2>/dev/null | grep -E '^\?\?|^ M|^ A' || true)

          if [ -n "$NEW_POSTS" ]; then
            echo "New blog posts detected:"
            echo "$NEW_POSTS"

            # Add all new posts
            git add _posts/

            # Also add any updated memory files
            if git status --porcelain .claude/agent-memory/ 2>/dev/null | grep -q .; then
              echo "Adding updated agent memory files..."
              git add .claude/agent-memory/
            fi

            # Create commit
            COMMIT_DATE=$(date +%Y-%m-%d)
            git commit -m "Weekly news update: $COMMIT_DATE

            Automated weekly blog post creation via GitHub Actions.

            Co-Authored-By: GitHub Actions <actions@github.com>"

            echo "Pushing changes..."
            git push
          else
            echo "No new blog posts to commit."
          fi

      - name: Update Workflow Status
        run: |
          echo "=== Workflow Summary ==="
          echo "Workflow: Weekly News Update"
          echo "Run ID: $GITHUB_RUN_ID"
          echo "Status: ${{ steps.run-agent.outputs.status }}"
          echo "Date: $(date)"
          echo ""
          echo "Next scheduled run: Next Sunday 12:00 UTC"
          echo ""
          echo "For manual execution:"
          echo "1. Go to Actions tab"
          echo "2. Select 'Weekly News Update' workflow"
          echo "3. Click 'Run workflow'"
          echo "4. Select 'main' branch"
