name: Automated Weekly News Update

on:
  schedule:
    # Run every Sunday at 12:00 UTC
    - cron: '0 12 * * 0'
  workflow_dispatch:  # Allow manual triggering

jobs:
  weekly-news-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for committing blog posts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper git operations

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Setup Claude Code environment
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL || 'https://api.anthropic.com' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL || 'claude-3-5-sonnet-20241022' }}
          ANTHROPIC_SMALL_FAST_MODEL: ${{ secrets.ANTHROPIC_SMALL_FAST_MODEL || 'claude-3-haiku-20240307' }}
        run: |
          echo "Claude Code environment configured"
          echo "Using API base URL: $ANTHROPIC_BASE_URL"
          echo "Model: $ANTHROPIC_MODEL"

          # Install Claude Code CLI if not present
          if ! command -v claude &> /dev/null; then
            echo "Installing Claude Code CLI..."
            curl -fsSL https://claude.ai/install.sh | bash
          fi

          # Install Exa Search MCP Client
          echo "Installing Exa Search MCP Client..."
          claude mcp add --transport http exa https://mcp.exa.ai/mcp?exaApiKey=8730d603-0ec6-44e1-bb7d-6dee910da9e0

      - name: Run Weekly News Update Scheduler Agent
        id: weekly-news-update-scheduler
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL || 'https://api.anthropic.com' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL || 'claude-3-5-sonnet-20241022' }}
          ANTHROPIC_SMALL_FAST_MODEL: ${{ secrets.ANTHROPIC_SMALL_FAST_MODEL || 'claude-3-haiku-20240307' }}
        run: |
          echo "=== Weekly News Update Scheduler ==="
          echo "Date: $(date)"
          echo "Repository: $(pwd)"

          # Check required files
          echo "Checking required files..."
          if [ ! -f "website-requirements.md" ]; then
            echo "ERROR: website-requirements.md not found"
            exit 1
          fi

          if [ ! -f "IBEcon-syllabus.md" ]; then
            echo "ERROR: IBEcon-syllabus.md not found"
            exit 1
          fi

          if [ ! -f ".claude/agents/weekly-news-update-scheduler.md" ]; then
            echo "ERROR: Agent configuration not found"
            exit 1
          fi

          echo "Required files found."

          # Create agent memory directory if it doesn't exist
          mkdir -p .claude/agent-memory/weekly-news-update-scheduler

          # Check for existing posts directory
          if [ ! -d "_posts" ]; then
            echo "Creating _posts directory..."
            mkdir -p _posts
          fi

          # Determine this week's date for reporting
          WEEK_DATE=$(date +%Y-%m-%d)
          echo "Week: $WEEK_DATE"

          # Create topic rotation schedule file if it doesn't exist
          COVERAGE_FILE=".claude/agent-memory/weekly-news-update-scheduler/topic-rotation-schedule.md"
          if [ ! -f "$COVERAGE_FILE" ]; then
            echo "# Topic Rotation Schedule" > "$COVERAGE_FILE"
            echo "" >> "$COVERAGE_FILE"
            echo "| Date | Topic | Subtopic | Status | Blog Post |" >> "$COVERAGE_FILE"
            echo "|------|-------|----------|--------|-----------|" >> "$COVERAGE_FILE"
          fi

          # Parse IB Economics syllabus to extract topics
          echo "Parsing IB Economics syllabus..."

          # Extract main topics from syllabus (31 topics across 4 units)
          # Unit 1: Introduction to Economics (2 topics)
          # Unit 2: Microeconomics (12 topics)
          # Unit 3: Macroeconomics (7 topics)
          # Unit 4: Global Economy (10 topics)

          # Read existing coverage to determine least covered topics
          echo "Analyzing existing coverage..."

          # Get list of existing posts and their tags to infer coverage
          EXISTING_TAGS=$(grep -h "^tags:" _posts/*.md 2>/dev/null | sed 's/tags://' | tr -d '[:space:]' | tr ',' '\n' | sort | uniq || echo "")

          # Read syllabus topics from memory file or parse fresh
          SYLLABUS_TOPICS_FILE=".claude/agent-memory/weekly-news-update-scheduler/syllabus-topics.md"
          if [ ! -f "$SYLLABUS_TOPICS_FILE" ]; then
            echo "Extracting syllabus topics..."
            # Parse IBEcon-syllabus.md to extract main topics
            grep -E "^[[:space:]]*[0-9]+\.[0-9]+" IBEcon-syllabus.md | head -31 > "$SYLLABUS_TOPICS_FILE"
          fi

          # Count total topics
          TOTAL_TOPICS=$(wc -l < "$SYLLABUS_TOPICS_FILE" 2>/dev/null || echo "31")

          # Select topic based on sophisticated algorithm considering:
          # 1. Past coverage (favoring less covered topics)
          # 2. Recent relevance (favoring current issues/headlines)
          # 3. Seasonal economic events
          # 4. Balance across syllabus units
          # 5. Success rate of previous attempts

          # Create a Python script for sophisticated topic selection
          cat > select_topic.py << 'PYEOF'
          import os
          import sys
          import json
          import re
          from datetime import datetime, timedelta
          from collections import defaultdict

          def parse_syllabus_topics(syllabus_file):
              """Parse syllabus topics from file"""
              topics = []
              with open(syllabus_file, 'r') as f:
                  for line in f:
                      line = line.strip()
                      if not line:
                          continue
                      # Extract topic number and name
                      match = re.match(r'^(\d+\.\d+)\s+(.+)$', line)
                      if match:
                          topic_num = match.group(1)
                          topic_name = match.group(2)
                          # Determine unit from topic number
                          unit_num = int(topic_num.split('.')[0])
                          topics.append({
                              'number': topic_num,
                              'name': topic_name,
                              'unit': unit_num,
                              'coverage_count': 0,
                              'last_covered': None,
                              'success_rate': 1.0  # Default success rate
                          })
              return topics

          def analyze_existing_posts(posts_dir):
              """Analyze existing blog posts to determine coverage"""
              coverage = defaultdict(int)
              unit_coverage = defaultdict(int)
              tags_by_topic = defaultdict(set)

              if not os.path.exists(posts_dir):
                  return coverage, unit_coverage, tags_by_topic

              for filename in os.listdir(posts_dir):
                  if filename.endswith('.md'):
                      filepath = os.path.join(posts_dir, filename)
                      try:
                          with open(filepath, 'r') as f:
                              content = f.read()
                              # Extract tags from frontmatter
                              tags_match = re.search(r'^tags:\s*$(.*?)^---', content, re.MULTILINE | re.DOTALL)
                              if tags_match:
                                  tags_section = tags_match.group(1)
                                  tags = [tag.strip().strip('-').strip() for tag in tags_section.strip().split('\n') if tag.strip()]
                                  # Map tags to syllabus topics
                                  for tag in tags:
                                      # Simple mapping - in reality would be more sophisticated
                                      if 'public goods' in tag.lower():
                                          coverage['2.9'] += 1
                                          unit_coverage[2] += 1
                                          tags_by_topic['2.9'].add(tag)
                                      elif 'market failure' in tag.lower():
                                          # Could be multiple market failure topics
                                          coverage['2.8'] += 1  # Default to externalities
                                          unit_coverage[2] += 1
                                          tags_by_topic['2.8'].add(tag)
                                      elif 'wealth inequality' in tag.lower() or 'income distribution' in tag.lower():
                                          coverage['2.12'] += 1
                                          unit_coverage[2] += 1
                                          tags_by_topic['2.12'].add(tag)
                                      elif 'government intervention' in tag.lower():
                                          coverage['2.7'] += 1
                                          unit_coverage[2] += 1
                                          tags_by_topic['2.7'].add(tag)
                      except Exception as e:
                          print(f"Error reading {filename}: {e}", file=sys.stderr)

              return coverage, unit_coverage, tags_by_topic

          def get_current_relevance_score(topic, current_date):
              """Calculate relevance score based on current economic context"""
              relevance_score = 0.5  # Base score

              # Seasonal considerations
              month = current_date.month
              quarter = (month - 1) // 3 + 1

              # Topic-specific seasonal relevance
              topic_lower = topic['name'].lower()

              # Q1 (Jan-Mar): Budget season, fiscal policy relevance
              if quarter == 1:
                  if 'fiscal' in topic_lower or 'budget' in topic_lower or 'government' in topic_lower:
                      relevance_score += 0.3

              # Q2 (Apr-Jun): Economic growth reports, monetary policy
              if quarter == 2:
                  if 'monetary' in topic_lower or 'growth' in topic_lower or 'economic activity' in topic_lower:
                      relevance_score += 0.3

              # Q3 (Jul-Sep): Summer policy announcements, trade
              if quarter == 3:
                  if 'trade' in topic_lower or 'international' in topic_lower or 'global' in topic_lower:
                      relevance_score += 0.3

              # Q4 (Oct-Dec): Year-end reviews, forecasts, inequality
              if quarter == 4:
                  if 'inequality' in topic_lower or 'equity' in topic_lower or 'review' in topic_lower:
                      relevance_score += 0.3

              # Always relevant topics (current economic issues)
              always_relevant = ['inflation', 'unemployment', 'trade', 'monetary policy', 'fiscal policy',
                                'economic growth', 'inequality', 'climate', 'sustainable']
              for keyword in always_relevant:
                  if keyword in topic_lower:
                      relevance_score += 0.2

              return min(relevance_score, 1.0)  # Cap at 1.0

          def calculate_topic_score(topic, coverage, unit_coverage, current_date, total_topics):
              """Calculate comprehensive score for topic selection"""
              # 1. Coverage penalty (higher for less covered topics)
              coverage_count = coverage.get(topic['number'], 0)
              coverage_penalty = 1.0 - (coverage_count / (max(coverage_count, 1) + 1))

              # 2. Unit balance (favor units with less coverage)
              unit_coverage_count = unit_coverage.get(topic['unit'], 0)
              unit_balance = 1.0 - (unit_coverage_count / (max(unit_coverage_count, 1) + 3))

              # 3. Recency penalty (avoid recently covered topics)
              recency_penalty = 1.0
              if topic.get('last_covered'):
                  days_since = (current_date - topic['last_covered']).days
                  if days_since < 30:  # Avoid topics covered in last month
                      recency_penalty = max(0.1, days_since / 30)

              # 4. Current relevance
              relevance_score = get_current_relevance_score(topic, current_date)

              # 5. Success rate (from historical data)
              success_rate = topic.get('success_rate', 1.0)

              # Combined score (weighted)
              score = (
                  coverage_penalty * 0.35 +      # 35% weight on coverage
                  unit_balance * 0.25 +          # 25% weight on unit balance
                  recency_penalty * 0.15 +       # 15% weight on recency
                  relevance_score * 0.20 +       # 20% weight on current relevance
                  success_rate * 0.05            # 5% weight on success rate
              )

              return score

          def select_best_topic(topics, coverage, unit_coverage, current_date):
              """Select the best topic based on comprehensive scoring"""
              if not topics:
                  return None

              # Calculate scores for all topics
              scored_topics = []
              for topic in topics:
                  score = calculate_topic_score(topic, coverage, unit_coverage, current_date, len(topics))
                  scored_topics.append((score, topic))

              # Sort by score (descending)
              scored_topics.sort(key=lambda x: x[0], reverse=True)

              # Return top 3 for fallback options
              top_topics = [topic for _, topic in scored_topics[:3]]

              return top_topics

          def main():
              # Configuration
              syllabus_file = sys.argv[1] if len(sys.argv) > 1 else '.claude/agent-memory/weekly-news-update-scheduler/syllabus-topics.md'
              posts_dir = sys.argv[2] if len(sys.argv) > 2 else '_posts'

              # Parse syllabus topics
              topics = parse_syllabus_topics(syllabus_file)
              if not topics:
                  print("ERROR: No topics found in syllabus file", file=sys.stderr)
                  sys.exit(1)

              # Analyze existing coverage
              coverage, unit_coverage, tags_by_topic = analyze_existing_posts(posts_dir)

              # Update topics with coverage data
              for topic in topics:
                  topic['coverage_count'] = coverage.get(topic['number'], 0)
                  # In a real implementation, would load last_covered and success_rate from memory

              # Current date for relevance calculation
              current_date = datetime.now()

              # Select best topics
              selected_topics = select_best_topic(topics, coverage, unit_coverage, current_date)

              if not selected_topics:
                  print("ERROR: No topics selected", file=sys.stderr)
                  sys.exit(1)

              # Output results as JSON
              output = {
                  'primary_topic': {
                      'number': selected_topics[0]['number'],
                      'name': selected_topics[0]['name'],
                      'unit': selected_topics[0]['unit']
                  },
                  'fallback_topics': [
                      {
                          'number': topic['number'],
                          'name': topic['name'],
                          'unit': topic['unit']
                      }
                      for topic in selected_topics[1:]
                  ],
                  'coverage_summary': {
                      'total_topics': len(topics),
                      'covered_topics': sum(1 for t in topics if t['coverage_count'] > 0),
                      'unit_coverage': dict(unit_coverage)
                  }
              }

              print(json.dumps(output, indent=2))

          if __name__ == '__main__':
              main()
          PYEOF

                    # Run the topic selection algorithm
                    echo "Running sophisticated topic selection algorithm..."
                    python3 select_topic.py "$SYLLABUS_TOPICS_FILE" "_posts"

                    # Parse the JSON output
                    SELECTION_RESULT=$(python3 select_topic.py "$SYLLABUS_TOPICS_FILE" "_posts" 2>/dev/null)

                    if [ -n "$SELECTION_RESULT" ]; then
                      # Extract primary topic using jq if available, otherwise use Python
                      if command -v jq &> /dev/null; then
                        TOPIC_NUMBER=$(echo "$SELECTION_RESULT" | jq -r '.primary_topic.number')
                        TOPIC_NAME=$(echo "$SELECTION_RESULT" | jq -r '.primary_topic.name')
                        TOPIC_UNIT=$(echo "$SELECTION_RESULT" | jq -r '.primary_topic.unit')
                      else
                        # Fallback to Python for JSON parsing
                        TOPIC_NUMBER=$(python3 -c "
          import json, sys
          data = json.loads('''$SELECTION_RESULT''')
          print(data['primary_topic']['number'])
          " 2>/dev/null)
                        TOPIC_NAME=$(python3 -c "
          import json, sys
          data = json.loads('''$SELECTION_RESULT''')
          print(data['primary_topic']['name'])
          " 2>/dev/null)
                        TOPIC_UNIT=$(python3 -c "
          import json, sys
          data = json.loads('''$SELECTION_RESULT''')
          print(data['primary_topic']['unit'])
          " 2>/dev/null)
                      fi

                      SELECTED_TOPIC="$TOPIC_NUMBER $TOPIC_NAME"
                      TOPIC="$TOPIC_NAME"

                      # Determine subtopic based on unit and current relevance
                      case $TOPIC_UNIT in
                        1) SUBTOPIC="Foundational concepts" ;;
                        2) SUBTOPIC="Market analysis" ;;
                        3) SUBTOPIC="Economic policy" ;;
                        4) SUBTOPIC="Global developments" ;;
                        *) SUBTOPIC="Current developments" ;;
                      esac

                      echo "Algorithm selected: $TOPIC (Unit $TOPIC_UNIT)"
                    else
                      # Fallback to simple rotation if algorithm fails
                      echo "WARNING: Topic selection algorithm failed, using fallback rotation"
                      WEEK_NUM=$(date +%W)
                      TOPIC_INDEX=$((WEEK_NUM % TOTAL_TOPICS + 1))
                      SELECTED_TOPIC=$(sed -n "${TOPIC_INDEX}p" "$SYLLABUS_TOPICS_FILE" 2>/dev/null || echo "Economic growth")
                      TOPIC=$(echo "$SELECTED_TOPIC" | sed 's/^[[:space:]]*[0-9]*\.[0-9]*[[:space:]]*//')
                      SUBTOPIC="Current developments"
                    fi

                    echo "Selected topic: $TOPIC"
                    echo "Subtopic: $SUBTOPIC"
                    echo "topic=$TOPIC" >> $GITHUB_OUTPUT
                    echo "subtopic=$SUBTOPIC" >> $GITHUB_OUTPUT

      - name: Invoke News Extraction Blogpost Writer Agent
        id: news-extraction-blogpost-writer
        if: steps.weekly-news-update-scheduler.outputs.topic != ''
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL || 'https://api.anthropic.com' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL || 'claude-3-5-sonnet-20241022' }}
          ANTHROPIC_SMALL_FAST_MODEL: ${{ secrets.ANTHROPIC_SMALL_FAST_MODEL || 'claude-3-haiku-20240307' }}
        run: |
          echo "=== Invoking News Extraction Blogpost Writer Agent ==="
          echo "Topic: ${{ steps.weekly-news-update-scheduler.outputs.topic }}"
          echo "Subtopic: ${{ steps.weekly-news-update-scheduler.outputs.subtopic }}"

          # Create agent invocation script
          cat > invoke_agent.sh << 'EOF'
          #!/bin/bash
          echo "Starting news extraction blogpost writer agent..."

          # Set up environment variables for Claude Code
          export ANTHROPIC_BASE_URL="$ANTHROPIC_BASE_URL"
          export ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY"
          export ANTHROPIC_MODEL="$ANTHROPIC_MODEL"
          export ANTHROPIC_SMALL_FAST_MODEL="$ANTHROPIC_SMALL_FAST_MODEL"

          # Create a temporary script to run the agent
          cat > run_agent.py << 'PYEOF'
          import os
          import subprocess
          import sys
          import json
          import time

          def run_claude_agent(topic):
              """Run Claude Code agent to create blog post"""
              # Build the agent command
              cmd = [
                  "claude", "-p", 
                  "--agents", "'{\n",
                  "\"news-extraction-blogpost-writer\"", ": {\n",
                  "\"description\":", "\"", f"Weekly news update: {topic}", "\"\n",
                  "\"prompt\":", "\"", f"Search for recent news articles about '{topic}' and create a blog post for the ECONews website. Follow all requirements in website-requirements.md exactly. Create the blog post in the _posts/ directory with proper YYYY-MM-DD-title-slug.md naming. Focus on finding actual recent news articles (within past 3 months) from reputable sources like Reuters, BBC, CNN, New York Times.", "\"\n",
                  "\"tools\":", "[\"Bash\", \"Glob\", \"Grep\", \"Read\", \"ListMcpResourcesTool\", \"ReadMcpResourceTool\", \"Edit\", \"Write\", \"NotebookEdit\", \"Skill\", \"TaskCreate\", \"TaskGet\", \"TaskUpdate\", \"TaskList\", \"EnterWorktree\", \"mcp__exa__web_search_exa\", \"mcp__exa__get_code_context_exa\"]",
                  "}}'",
              ]

              print(f"Running command: {' '.join(cmd)}")

              try:
                  # Run the agent
                  result = subprocess.run(
                      cmd,
                      capture_output=True,
                      text=True,
                      timeout=600  # 10 minute timeout
                  )

                  print(f"Exit code: {result.returncode}")
                  print(f"Stdout: {result.stdout}")
                  print(f"Stderr: {result.stderr}")

                  return result.returncode == 0

              except subprocess.TimeoutExpired:
                  print("ERROR: Agent execution timed out after 5 minutes")
                  return False
              except Exception as e:
                  print(f"ERROR: Failed to run agent: {e}")
                  return False

          if __name__ == "__main__":
              topic = sys.argv[1] if len(sys.argv) > 1 else "economic growth"
              success = run_claude_agent(topic)
              sys.exit(0 if success else 1)
          PYEOF

          # Run the Python script
          python3 run_agent.py "${{ steps.weekly-news-update-scheduler.outputs.topic }}"

          # Check if new blog post was created
          DATE=$(date +%Y-%m-%d)
          NEW_POSTS=$(find _posts -name "${DATE}-*.md" -type f 2>/dev/null | wc -l)

          if [ "$NEW_POSTS" -gt 0 ]; then
              echo "✅ Successfully created blog post for ${{ steps.weekly-news-update-scheduler.outputs.topic }}"
              echo "status=success" >> $GITHUB_OUTPUT
              echo "post_count=$NEW_POSTS" >> $GITHUB_OUTPUT
          else
              echo "❌ No new blog post created for ${{ steps.weekly-news-update-scheduler.outputs.topic }}"
              echo "status=failed" >> $GITHUB_OUTPUT
              echo "post_count=0" >> $GITHUB_OUTPUT
          fi
          EOF

          chmod +x invoke_agent.sh
          ./invoke_agent.sh

      - name: Create GitHub Issue on Failure
        if: steps.news-extraction-blogpost-writer.outputs.status != 'success' || failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const topic = "${{ steps.weekly-news-update-scheduler.outputs.topic }}";
            const subtopic = "${{ steps.weekly-news-update-scheduler.outputs.subtopic }}";
            const postCount = "${{ steps.news-extraction-blogpost-writer.outputs.post_count || '0' }}";

            let body = `Weekly news update automation failed for topic: **${topic}** (${subtopic})\n\n`;
            body += `**Details:**\n`;
            body += `- Date: ${today}\n`;
            body += `- Topic: ${topic}\n`;
            body += `- Subtopic: ${subtopic}\n`;
            body += `- Posts created: ${postCount}\n\n`;
            body += `**Next Steps:**\n`;
            body += `1. Check workflow run logs for detailed error information\n`;
            body += `2. Review agent configuration in .claude/agents/news-extraction-blogpost-writer.md\n`;
            body += `3. Verify API credentials and Claude Code installation\n`;
            body += `4. Consider trying an alternative topic if this one consistently fails\n\n`;
            body += `**Fallback Topics:**\n`;
            body += `- Inflation trends and central bank policies\n`;
            body += `- International trade developments\n`;
            body += `- Labor market and unemployment data\n`;
            body += `- Government fiscal policies and budgets\n`;
            body += `- Environmental economics and carbon pricing\n\n`;
            body += `*This issue was automatically generated by the Weekly News Update workflow.*`;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly News Update Failed - ${today}: ${topic}`,
              body: body,
              labels: ['automation', 'news-update', 'needs-attention', 'agent-failure']
            })

      - name: Update Coverage Tracking
        if: steps.news-extraction-blogpost-writer.outputs.status == 'success'
        run: |
          echo "=== Updating Coverage Tracking ==="
          DATE=$(date +%Y-%m-%d)
          TOPIC="${{ steps.weekly-news-update-scheduler.outputs.topic }}"
          SUBTOPIC="${{ steps.weekly-news-update-scheduler.outputs.subtopic }}"

          # Create or update coverage tracking file
          COVERAGE_FILE=".claude/agent-memory/weekly-news-update-scheduler/topic-rotation-schedule.md"
          mkdir -p "$(dirname "$COVERAGE_FILE")"

          if [ ! -f "$COVERAGE_FILE" ]; then
            echo "# Topic Rotation Schedule" > "$COVERAGE_FILE"
            echo "" >> "$COVERAGE_FILE"
            echo "| Date | Topic | Subtopic | Status | Blog Post |" >> "$COVERAGE_FILE"
            echo "|------|-------|----------|--------|-----------|" >> "$COVERAGE_FILE"
          fi

          # Find the latest blog post
          LATEST_POST=$(ls -t _posts/*.md 2>/dev/null | head -1)
          POST_NAME=$(basename "$LATEST_POST" 2>/dev/null || echo "unknown")

          echo "| $DATE | $TOPIC | $SUBTOPIC | Success | $POST_NAME |" >> "$COVERAGE_FILE"

          echo "Coverage tracking updated in $COVERAGE_FILE"

          # Also update memory file with algorithm details
          MEMORY_FILE=".claude/agent-memory/weekly-news-update-scheduler/MEMORY.md"
          if [ ! -f "$MEMORY_FILE" ]; then
            echo "# Weekly News Update Scheduler Memory" > "$MEMORY_FILE"
            echo "" >> "$MEMORY_FILE"
            echo "## System Status" >> "$MEMORY_FILE"
            echo "- **Initial Setup**: Agent configuration created on 2026-03-08" >> "$MEMORY_FILE"
            echo "- **GitHub Actions**: Automated weekly news update workflow" >> "$MEMORY_FILE"
            echo "- **Memory Structure**: Directory created with initial files" >> "$MEMORY_FILE"
            echo "- **Topic Rotation**: Syllabus parsed, 31 main topics identified" >> "$MEMORY_FILE"
            echo "- **Topic Selection**: Sophisticated algorithm implemented (coverage + relevance)" >> "$MEMORY_FILE"
            echo "" >> "$MEMORY_FILE"
            echo "## IB Economics Syllabus Coverage" >> "$MEMORY_FILE"
            echo "- **Total Topics**: 31 main topics across 4 units" >> "$MEMORY_FILE"
            echo "- **Unit 1**: Introduction to Economics (2 topics)" >> "$MEMORY_FILE"
            echo "- **Unit 2**: Microeconomics (12 topics)" >> "$MEMORY_FILE"
            echo "- **Unit 3**: Macroeconomics (7 topics)" >> "$MEMORY_FILE"
            echo "- **Unit 4**: Global Economy (10 topics)" >> "$MEMORY_FILE"
          fi

          # Update current coverage status with algorithm insights
          POST_COUNT=$(find _posts -name "*.md" -type f | wc -l)
          COVERAGE_PERCENT=$((POST_COUNT * 100 / 31))  # 31 topics total

          # Enhanced update with algorithm details
          echo "" >> "$MEMORY_FILE"
          echo "## Latest Update: $DATE" >> "$MEMORY_FILE"
          echo "- **Topic Covered**: $TOPIC - $SUBTOPIC" >> "$MEMORY_FILE"
          echo "- **Blog Post**: $POST_NAME" >> "$MEMORY_FILE"
          echo "- **Algorithm Selection**: Coverage + relevance weighted scoring" >> "$MEMORY_FILE"
          echo "- **Estimated Coverage**: $COVERAGE_PERCENT%" >> "$MEMORY_FILE"
          echo "- **Selection Factors**:" >> "$MEMORY_FILE"
          echo "  - Past coverage analysis" >> "$MEMORY_FILE"
          echo "  - Current economic relevance" >> "$MEMORY_FILE"
          echo "  - Seasonal considerations" >> "$MEMORY_FILE"
          echo "  - Unit balance optimization" >> "$MEMORY_FILE"

          # Create syllabus topics file if it doesn't exist
          SYLLABUS_TOPICS_FILE=".claude/agent-memory/weekly-news-update-scheduler/syllabus-topics.md"
          if [ ! -f "$SYLLABUS_TOPICS_FILE" ]; then
            echo "Creating syllabus topics file..."
            # Extract main topics from IBEcon-syllabus.md
            grep -E "^[[:space:]]*[0-9]+\.[0-9]+" IBEcon-syllabus.md | head -31 > "$SYLLABUS_TOPICS_FILE"
            echo "Extracted $(wc -l < "$SYLLABUS_TOPICS_FILE") topics to $SYLLABUS_TOPICS_FILE"
          fi

      - name: Commit and Push New Blog Post
        if: steps.news-extraction-blogpost-writer.outputs.status == 'success'
        run: |
          echo "=== Committing and Pushing New Blog Post ==="

          # Check if there are any new posts to commit
          DATE=$(date +%Y-%m-%d)
          NEW_POSTS=$(find _posts -name "${DATE}-*.md" -type f 2>/dev/null)

          if [ -z "$NEW_POSTS" ]; then
            echo "No new posts found for today ($DATE)"
            exit 0
          fi

          echo "New posts found:"
          echo "$NEW_POSTS"

          # Add the new posts
          git add _posts/

          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Commit the new posts
          git commit -m "$(cat <<'EOF'
          Weekly news update: ${{ steps.weekly-news-update-scheduler.outputs.topic }}

          Automated blog post created by news-extraction-blogpost-writer agent.

          Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
          EOF
          )"

          # Push to repository
          git push

          echo "✅ Successfully committed and pushed new blog post"

      - name: Workflow Summary
        run: |
          echo "=== Automated Weekly News Update Summary ==="
          echo "Workflow: $GITHUB_WORKFLOW"
          echo "Run ID: $GITHUB_RUN_ID"
          echo "Date: $(date)"
          echo "Status: ${{ steps.news-extraction-blogpost-writer.outputs.status || 'unknown' }}"
          echo ""

          if [ "${{ steps.news-extraction-blogpost-writer.outputs.status }}" = "success" ]; then
            echo "✅ Successfully created weekly blog post"
            echo "Topic: ${{ steps.weekly-news-update-scheduler.outputs.topic }}"
            echo "Subtopic: ${{ steps.weekly-news-update-scheduler.outputs.subtopic }}"
            echo "Agent used: news-extraction-blogpost-writer"
            echo "Posts created: ${{ steps.news-extraction-blogpost-writer.outputs.post_count || '0' }}"
          else
            echo "❌ Workflow failed - check logs for details"
            echo "GitHub Issue created for manual intervention"
          fi

          echo ""
          echo "Next scheduled run: Next Sunday 12:00 UTC"
          echo ""
          echo "For manual execution:"
          echo "1. Go to Actions tab"
          echo "2. Select 'Automated Weekly News Update' workflow"
          echo "3. Click 'Run workflow'"
          echo "4. Select 'main' branch"