name: Automated Weekly News Update

on:
  schedule:
    # Run every Sunday at 12:00 UTC
    - cron: '0 12 * * 0'
  workflow_dispatch:  # Allow manual triggering

jobs:
  weekly-news-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for committing blog posts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper git operations

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Setup Claude Code environment
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL || 'https://api.anthropic.com' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL || 'claude-3-5-sonnet-20241022' }}
          ANTHROPIC_SMALL_FAST_MODEL: ${{ secrets.ANTHROPIC_SMALL_FAST_MODEL || 'claude-3-haiku-20240307' }}
        run: |
          echo "Claude Code environment configured"
          echo "Using API base URL: $ANTHROPIC_BASE_URL"
          echo "Model: $ANTHROPIC_MODEL"

          # Install Claude Code CLI if not present
          if ! command -v claude &> /dev/null; then
            echo "Installing Claude Code CLI..."
            curl -fsSL https://claude.ai/install.sh | bash
          fi

          # Install Exa Search MCP Client
          echo "Installing Exa Search MCP Client..."
          claude mcp add --transport http exa https://exa.run.tools

      - name: Run Weekly News Update Scheduler Agent
        id: weekly-news-update-scheduler
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL || 'https://api.anthropic.com' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL || 'claude-3-5-sonnet-20241022' }}
          ANTHROPIC_SMALL_FAST_MODEL: ${{ secrets.ANTHROPIC_SMALL_FAST_MODEL || 'claude-3-haiku-20240307' }}
        run: |
          echo "=== Weekly News Update Scheduler ==="
          echo "Date: $(date)"
          echo "Repository: $(pwd)"

          # Check required files
          echo "Checking required files..."
          if [ ! -f "website-requirements.md" ]; then
            echo "ERROR: website-requirements.md not found"
            exit 1
          fi

          if [ ! -f "IBEcon-syllabus.md" ]; then
            echo "ERROR: IBEcon-syllabus.md not found"
            exit 1
          fi

          if [ ! -f ".claude/agents/weekly-news-update-scheduler.md" ]; then
            echo "ERROR: Agent configuration not found"
            exit 1
          fi

          echo "Required files found."

          # Create agent memory directory if it doesn't exist
          mkdir -p .claude/agent-memory/weekly-news-update-scheduler

          # Check for existing posts directory
          if [ ! -d "_posts" ]; then
            echo "Creating _posts directory..."
            mkdir -p _posts
          fi

          # Determine this week's date for reporting
          WEEK_DATE=$(date +%Y-%m-%d)
          echo "Week: $WEEK_DATE"

          # Create topic rotation schedule file if it doesn't exist
          COVERAGE_FILE=".claude/agent-memory/weekly-news-update-scheduler/topic-rotation-schedule.md"
          if [ ! -f "$COVERAGE_FILE" ]; then
            echo "# Topic Rotation Schedule" > "$COVERAGE_FILE"
            echo "" >> "$COVERAGE_FILE"
            echo "| Date | Topic | Subtopic | Status | Blog Post |" >> "$COVERAGE_FILE"
            echo "|------|-------|----------|--------|-----------|" >> "$COVERAGE_FILE"
          fi

          # Parse IB Economics syllabus to extract topics
          echo "Parsing IB Economics syllabus..."

          # Extract main topics from syllabus (31 topics across 4 units)
          # Unit 1: Introduction to Economics (2 topics)
          # Unit 2: Microeconomics (12 topics)
          # Unit 3: Macroeconomics (7 topics)
          # Unit 4: Global Economy (10 topics)

          # Read existing coverage to determine least covered topics
          echo "Analyzing existing coverage..."

          # Get list of existing posts and their tags to infer coverage
          EXISTING_TAGS=$(grep -h "^tags:" _posts/*.md 2>/dev/null | sed 's/tags://' | tr -d '[:space:]' | tr ',' '\n' | sort | uniq || echo "")

          # Read syllabus topics from memory file or parse fresh
          SYLLABUS_TOPICS_FILE=".claude/agent-memory/weekly-news-update-scheduler/syllabus-topics.md"
          if [ ! -f "$SYLLABUS_TOPICS_FILE" ]; then
            echo "Extracting syllabus topics..."
            # Parse IBEcon-syllabus.md to extract main topics
            grep -E "^[[:space:]]*[0-9]+\.[0-9]+" IBEcon-syllabus.md | head -31 > "$SYLLABUS_TOPICS_FILE"
          fi

          # Count total topics
          TOTAL_TOPICS=$(wc -l < "$SYLLABUS_TOPICS_FILE" 2>/dev/null || echo "31")

          # Select topic based on coverage and relevance
          # For now, use a simple rotation based on week number
          WEEK_NUM=$(date +%W)
          TOPIC_INDEX=$((WEEK_NUM % TOTAL_TOPICS + 1))

          # Get the selected topic
          SELECTED_TOPIC=$(sed -n "${TOPIC_INDEX}p" "$SYLLABUS_TOPICS_FILE" 2>/dev/null || echo "Economic growth")

          # Clean up topic name for output
          TOPIC=$(echo "$SELECTED_TOPIC" | sed 's/^[[:space:]]*[0-9]*\.[0-9]*[[:space:]]*//')
          SUBTOPIC="Current developments"  # Generic subtopic for news search

          echo "Selected topic: $TOPIC"
          echo "Week number: $WEEK_NUM, Topic index: $TOPIC_INDEX"
          echo "topic=$TOPIC" >> $GITHUB_OUTPUT
          echo "subtopic=$SUBTOPIC" >> $GITHUB_OUTPUT

      - name: Invoke News Extraction Blogpost Writer Agent
        id: news-extraction-blogpost-writer
        if: steps.weekly-news-update-scheduler.outputs.topic != ''
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL || 'https://api.anthropic.com' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL || 'claude-3-5-sonnet-20241022' }}
          ANTHROPIC_SMALL_FAST_MODEL: ${{ secrets.ANTHROPIC_SMALL_FAST_MODEL || 'claude-3-haiku-20240307' }}
        run: |
          echo "=== Invoking News Extraction Blogpost Writer Agent ==="
          echo "Topic: ${{ steps.weekly-news-update-scheduler.outputs.topic }}"
          echo "Subtopic: ${{ steps.weekly-news-update-scheduler.outputs.subtopic }}"

          # Create agent invocation script
          cat > invoke_agent.sh << 'EOF'
          #!/bin/bash
          echo "Starting news extraction blogpost writer agent..."

          # Set up environment variables for Claude Code
          export ANTHROPIC_BASE_URL="$ANTHROPIC_BASE_URL"
          export ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY"
          export ANTHROPIC_MODEL="$ANTHROPIC_MODEL"
          export ANTHROPIC_SMALL_FAST_MODEL="$ANTHROPIC_SMALL_FAST_MODEL"

          # Create a temporary script to run the agent
          cat > run_agent.py << 'PYEOF'
          import os
          import subprocess
          import sys
          import json
          import time

          def run_claude_agent(topic):
              """Run Claude Code agent to create blog post"""
              # Build the agent command
              cmd = [
                  "claude",
                  "--agents", "'{\n",
                  "\"news-extraction-blogpost-writer\"", ": {\n",
                  "\"description\":", "\"", f"Weekly news update: {topic}", "\"\n",
                  "\"prompt\":", "\"", f"Search for recent news articles about '{topic}' and create a blog post for the ECONews website. Follow all requirements in website-requirements.md exactly. Create the blog post in the _posts/ directory with proper YYYY-MM-DD-title-slug.md naming. Focus on finding actual recent news articles (within past 3 months) from reputable sources like Reuters, BBC, CNN, New York Times. Ensure the article has clear connections to IB Economics syllabus topics. Write a 300-word news summary and 300-word IB Economics analysis with explicit syllabus connections.", "\"\n",
                  "}}'"
              ]

              print(f"Running command: {' '.join(cmd)}")

              try:
                  # Run the agent
                  result = subprocess.run(
                      cmd,
                      capture_output=True,
                      text=True,
                      timeout=300  # 5 minute timeout
                  )

                  print(f"Exit code: {result.returncode}")
                  print(f"Stdout: {result.stdout}")
                  print(f"Stderr: {result.stderr}")

                  return result.returncode == 0

              except subprocess.TimeoutExpired:
                  print("ERROR: Agent execution timed out after 5 minutes")
                  return False
              except Exception as e:
                  print(f"ERROR: Failed to run agent: {e}")
                  return False

          if __name__ == "__main__":
              topic = sys.argv[1] if len(sys.argv) > 1 else "economic growth"
              success = run_claude_agent(topic)
              sys.exit(0 if success else 1)
          PYEOF

          # Run the Python script
          python3 run_agent.py "${{ steps.weekly-news-update-scheduler.outputs.topic }}"

          # Check if new blog post was created
          DATE=$(date +%Y-%m-%d)
          NEW_POSTS=$(find _posts -name "${DATE}-*.md" -type f 2>/dev/null | wc -l)

          if [ "$NEW_POSTS" -gt 0 ]; then
              echo "✅ Successfully created blog post for ${{ steps.weekly-news-update-scheduler.outputs.topic }}"
              echo "status=success" >> $GITHUB_OUTPUT
              echo "post_count=$NEW_POSTS" >> $GITHUB_OUTPUT
          else
              echo "❌ No new blog post created for ${{ steps.weekly-news-update-scheduler.outputs.topic }}"
              echo "status=failed" >> $GITHUB_OUTPUT
              echo "post_count=0" >> $GITHUB_OUTPUT
          fi
          EOF

          chmod +x invoke_agent.sh
          ./invoke_agent.sh

      - name: Create GitHub Issue on Failure
        if: steps.news-extraction-blogpost-writer.outputs.status != 'success' || failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const topic = "${{ steps.weekly-news-update-scheduler.outputs.topic }}";
            const subtopic = "${{ steps.weekly-news-update-scheduler.outputs.subtopic }}";
            const postCount = "${{ steps.news-extraction-blogpost-writer.outputs.post_count || '0' }}";

            let body = `Weekly news update automation failed for topic: **${topic}** (${subtopic})\n\n`;
            body += `**Details:**\n`;
            body += `- Date: ${today}\n`;
            body += `- Topic: ${topic}\n`;
            body += `- Subtopic: ${subtopic}\n`;
            body += `- Posts created: ${postCount}\n\n`;
            body += `**Next Steps:**\n`;
            body += `1. Check workflow run logs for detailed error information\n`;
            body += `2. Review agent configuration in .claude/agents/news-extraction-blogpost-writer.md\n`;
            body += `3. Verify API credentials and Claude Code installation\n`;
            body += `4. Consider trying an alternative topic if this one consistently fails\n\n`;
            body += `**Fallback Topics:**\n`;
            body += `- Inflation trends and central bank policies\n`;
            body += `- International trade developments\n`;
            body += `- Labor market and unemployment data\n`;
            body += `- Government fiscal policies and budgets\n`;
            body += `- Environmental economics and carbon pricing\n\n`;
            body += `*This issue was automatically generated by the Weekly News Update workflow.*`;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly News Update Failed - ${today}: ${topic}`,
              body: body,
              labels: ['automation', 'news-update', 'needs-attention', 'agent-failure']
            })
      - name: Update Coverage Tracking
        if: steps.news-extraction-blogpost-writer.outputs.status == 'success'
        run: |
          echo "=== Updating Coverage Tracking ==="
          DATE=$(date +%Y-%m-%d)
          TOPIC="${{ steps.weekly-news-update-scheduler.outputs.topic }}"
          SUBTOPIC="${{ steps.weekly-news-update-scheduler.outputs.subtopic }}"

          # Create or update coverage tracking file
          COVERAGE_FILE=".claude/agent-memory/weekly-news-update-scheduler/topic-rotation-schedule.md"
          mkdir -p "$(dirname "$COVERAGE_FILE")"

          if [ ! -f "$COVERAGE_FILE" ]; then
            echo "# Topic Rotation Schedule" > "$COVERAGE_FILE"
            echo "" >> "$COVERAGE_FILE"
            echo "| Date | Topic | Subtopic | Status | Blog Post |" >> "$COVERAGE_FILE"
            echo "|------|-------|----------|--------|-----------|" >> "$COVERAGE_FILE"
          fi

          # Find the latest blog post
          LATEST_POST=$(ls -t _posts/*.md 2>/dev/null | head -1)
          POST_NAME=$(basename "$LATEST_POST" 2>/dev/null || echo "unknown")

          echo "| $DATE | $TOPIC | $SUBTOPIC | Success | $POST_NAME |" >> "$COVERAGE_FILE"

          echo "Coverage tracking updated in $COVERAGE_FILE"

          # Also update memory file
          MEMORY_FILE=".claude/agent-memory/weekly-news-update-scheduler/MEMORY.md"
          if [ ! -f "$MEMORY_FILE" ]; then
            echo "# Weekly News Update Scheduler Memory" > "$MEMORY_FILE"
            echo "" >> "$MEMORY_FILE"
            echo "## System Status" >> "$MEMORY_FILE"
            echo "- **Initial Setup**: Agent configuration created on 2026-03-08" >> "$MEMORY_FILE"
            echo "- **GitHub Actions**: Automated weekly news update workflow" >> "$MEMORY_FILE"
            echo "- **Memory Structure**: Directory created with initial files" >> "$MEMORY_FILE"
            echo "- **Topic Rotation**: Syllabus parsed, 31 main topics identified" >> "$MEMORY_FILE"
            echo "" >> "$MEMORY_FILE"
            echo "## IB Economics Syllabus Coverage" >> "$MEMORY_FILE"
            echo "- **Total Topics**: 31 main topics across 4 units" >> "$MEMORY_FILE"
            echo "- **Unit 1**: Introduction to Economics (2 topics)" >> "$MEMORY_FILE"
            echo "- **Unit 2**: Microeconomics (12 topics)" >> "$MEMORY_FILE"
            echo "- **Unit 3**: Macroeconomics (7 topics)" >> "$MEMORY_FILE"
            echo "- **Unit 4**: Global Economy (10 topics)" >> "$MEMORY_FILE"
          fi

          # Update current coverage status
          POST_COUNT=$(find _posts -name "*.md" -type f | wc -l)
          COVERAGE_PERCENT=$((POST_COUNT * 100 / 31))  # 31 topics total

          # Simple update - in reality would be more sophisticated
          echo "" >> "$MEMORY_FILE"
          echo "## Latest Update: $DATE" >> "$MEMORY_FILE"
          echo "- **Topic Covered**: $TOPIC - $SUBTOPIC" >> "$MEMORY_FILE"
          echo "- **Blog Post**: $POST_NAME" >> "$MEMORY_FILE"
          echo "- **Estimated Coverage**: $COVERAGE_PERCENT%" >> "$MEMORY_FILE"

          # Create syllabus topics file if it doesn't exist
          SYLLABUS_TOPICS_FILE=".claude/agent-memory/weekly-news-update-scheduler/syllabus-topics.md"
          if [ ! -f "$SYLLABUS_TOPICS_FILE" ]; then
            echo "Creating syllabus topics file..."
            # Extract main topics from IBEcon-syllabus.md
            grep -E "^[[:space:]]*[0-9]+\.[0-9]+" IBEcon-syllabus.md | head -31 > "$SYLLABUS_TOPICS_FILE"
            echo "Extracted $(wc -l < "$SYLLABUS_TOPICS_FILE") topics to $SYLLABUS_TOPICS_FILE"
          fi

      - name: Commit and Push New Blog Post
        if: steps.news-extraction-blogpost-writer.outputs.status == 'success'
        run: |
          echo "=== Committing and Pushing New Blog Post ==="

          # Check if there are any new posts to commit
          DATE=$(date +%Y-%m-%d)
          NEW_POSTS=$(find _posts -name "${DATE}-*.md" -type f 2>/dev/null)

          if [ -z "$NEW_POSTS" ]; then
            echo "No new posts found for today ($DATE)"
            exit 0
          fi

          echo "New posts found:"
          echo "$NEW_POSTS"

          # Add the new posts
          git add _posts/

          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Commit the new posts
          git commit -m "$(cat <<'EOF'
          Weekly news update: ${{ steps.weekly-news-update-scheduler.outputs.topic }}

          Automated blog post created by news-extraction-blogpost-writer agent.

          Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
          EOF
          )"

          # Push to repository
          git push

          echo "✅ Successfully committed and pushed new blog post"

      - name: Workflow Summary
        run: |
          echo "=== Automated Weekly News Update Summary ==="
          echo "Workflow: $GITHUB_WORKFLOW"
          echo "Run ID: $GITHUB_RUN_ID"
          echo "Date: $(date)"
          echo "Status: ${{ steps.news-extraction-blogpost-writer.outputs.status || 'unknown' }}"
          echo ""

          if [ "${{ steps.news-extraction-blogpost-writer.outputs.status }}" = "success" ]; then
            echo "✅ Successfully created weekly blog post"
            echo "Topic: ${{ steps.weekly-news-update-scheduler.outputs.topic }}"
            echo "Subtopic: ${{ steps.weekly-news-update-scheduler.outputs.subtopic }}"
            echo "Agent used: news-extraction-blogpost-writer"
            echo "Posts created: ${{ steps.news-extraction-blogpost-writer.outputs.post_count || '0' }}"
          else
            echo "❌ Workflow failed - check logs for details"
            echo "GitHub Issue created for manual intervention"
          fi

          echo ""
          echo "Next scheduled run: Next Sunday 12:00 UTC"
          echo ""
          echo "For manual execution:"
          echo "1. Go to Actions tab"
          echo "2. Select 'Automated Weekly News Update' workflow"
          echo "3. Click 'Run workflow'"
          echo "4. Select 'main' branch"