<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">

  <!-- CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <!-- SEO -->
  {% seo %}

  <!-- Feed -->
  {% feed_meta %}
</head>
<body>
  <div class="container">
    <div class="layout">
      <!-- Navigation Column (Right) -->
      <nav class="nav-column">
        <div class="nav-header">
          <h1 class="site-title">{{ site.title }}</h1>
          <p class="site-description">{{ site.description }}</p>
        </div>

        <ul class="nav-menu" role="navigation" aria-label="Main navigation">
          <li>
            <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %} aria-label="Home">
              <i class="fas fa-home"></i> Home
            </a>
          </li>
          <li>
            <a href="{{ '/about/' | relative_url }}" {% if page.url contains '/about/' %}class="active"{% endif %} aria-label="About">
              <i class="fas fa-info-circle"></i> About
            </a>
          </li>
          <li>
            <a href="{{ '/news/' | relative_url }}" {% if page.url contains '/news/' %}class="active"{% endif %} aria-label="News Archive">
              <i class="fas fa-newspaper"></i> Selected News
            </a>
          </li>
          <li>
            <a href="{{ '/contact/' | relative_url }}" {% if page.url contains '/contact/' %}class="active"{% endif %} aria-label="Contact">
              <i class="fas fa-envelope"></i> Contact
            </a>
          </li>
        </ul>

        <div class="nav-footer">
          <p><i class="fas fa-graduation-cap"></i> An IB Economics Companion Site</p>
          <p class="copyright">&copy; {{ site.time | date: '%Y' }} {{ site.title }}</p>
          <p class="copyright">
            <small>
              <i class="fas fa-code"></i> Built with Jekyll & GitHub Pages
            </small>
          </p>
        </div>
      </nav>

      <!-- Content Column (Left) -->
      <main class="content-column">
        {{ content }}
      </main>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
