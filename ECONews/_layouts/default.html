<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <!-- SEO -->
  {% seo %}

  <!-- Feed -->
  {% feed_meta %}
</head>
<body>
  <div class="container">
    <div class="layout">
      <!-- Navigation Column (Right) -->
      <nav class="nav-column">
        <div class="nav-header">
          <h1 class="site-title">{{ site.title }}</h1>
          <p class="site-description">{{ site.description }}</p>
        </div>

        <ul class="nav-menu">
          <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a></li>
          <li><a href="{{ '/about/' | relative_url }}" {% if page.url contains '/about/' %}class="active"{% endif %}>About</a></li>
          <li><a href="{{ '/news/' | relative_url }}" {% if page.url contains '/news/' %}class="active"{% endif %}>Selected News</a></li>
          <li><a href="{{ '/contact/' | relative_url }}" {% if page.url contains '/contact/' %}class="active"{% endif %}>Contact</a></li>
        </ul>

        <div class="nav-footer">
          <p>An IB Economics Companion Site</p>
          <p class="copyright">&copy; {{ site.time | date: '%Y' }} {{ site.title }}</p>
        </div>
      </nav>

      <!-- Content Column (Left) -->
      <main class="content-column">
        {{ content }}
      </main>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
