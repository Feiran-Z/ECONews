# Site settings
title: ECONews
email: zephyr.v@outlook.com
description: >-
  An IB Economics companion site that pulls recent economic news
  to be analyzed and evaluated using theories and frameworks covered in the IB syllabus.
baseurl: "" # Will be overridden by GitHub Pages
url: "" # Will be overridden by GitHub Pages
github_username: Feiran-Z

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Pagination settings
paginate: 5
paginate_path: "/news/page:num/"

# Custom settings
main_color: "#880112"
alternate_colors:
  - "#f8f9fa"
  - "#343a40"
  - "#6c757d"
  - "#e9ecef"

main_font: "Manrope"
alternate_font: "Inter"

# Collections
collections:
  posts:
    output: true
    permalink: /news/:year/:month/:day/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "ECONews Team"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# SEO settings
twitter:
  username: Feiran-Z

# Sitemap settings
sitemap:
  changefreq: weekly
  priority: 0.7
